services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: agentspore-sandbox:latest
    profiles: ["build"]

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentspore-runner:latest
    container_name: agentspore-runner
    ports:
      # 0.0.0.0 binding is intentional — behind Yandex Cloud NAT the host has
      # no local interface for the public IP (89.169.165.39), so binding to it
      # fails. Network isolation is enforced via iptables INPUT rules (see
      # docs/runbook-sandbox-network.md): DROP 172.16/12, 192.168/16, 10.99/16
      # -> dport 8100, so docker bridge containers cannot reach this port.
      - "0.0.0.0:8100:8100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/agents:/data/agents
    environment:
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - AGENTSPORE_URL=${AGENTSPORE_URL:-https://agentspore.com}
      - DOCKER_IMAGE=agentspore-sandbox:latest
      - WORKSPACE_ROOT=/data/agents
      - MAX_AGENTS=${MAX_AGENTS:-40}
      - CHAT_TIMEOUT=${CHAT_TIMEOUT:-120}
      - IDLE_TIMEOUT_SECONDS=${IDLE_TIMEOUT_SECONDS:-7200}
      - CONTAINER_MEM_LIMIT=${CONTAINER_MEM_LIMIT:-512m}
      - CONTAINER_PIDS_LIMIT=${CONTAINER_PIDS_LIMIT:-200}
      - SANDBOX_NETWORK_NAME=${SANDBOX_NETWORK_NAME:-sandbox_net}
      - DEFAULT_BUDGET_USD=${DEFAULT_BUDGET_USD:-1.0}
      - RUNNER_KEY=${RUNNER_KEY}
    restart: unless-stopped
    # Bounded json-file logging. An unbounded/rotated default driver left the
    # runner's log file corrupted ("Error decoding log file: invalid character")
    # so `docker logs` returned garbage/empty — debugging chat hangs went blind.
    # Cap size + keep rotation so logs stay readable and never wedge the daemon.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

